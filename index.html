<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <!-- Enable standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- Status bar style -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- App name -->
    <meta name="apple-mobile-web-app-title" content="Rummy Timer">

    <!-- App icon -->
    <link rel="apple-touch-icon" href="icon.png">

    <title>Rummy Timer</title>

    <style>
        html,
        body {
            overscroll-behavior: none;
        }

        input,
        select,
        textarea {
            font-size: 16px;
        }

        body {
            margin: 0;
            font-family: system-ui;
            height: 100vh;
            overflow: hidden;
            background: #0f172a;
            color: white;
        }

        /* Layout */
        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding-left: 0.8rem;
            padding-right: 0.8rem;
        }

        /* Inputs FIXED */
        input,
        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            font-size: 14px;
        }

        /* Player row */
        .player-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .player-row input {
            flex: 1;
        }

        /* Button FIXED */
        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #d1d5db);
            color: black;
            cursor: pointer;
        }

        /* Color preview */
        .color-preview {
            width: 40px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* FULLSCREEN PICKER */
        .color-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .color-modal.active {
            display: flex;
        }

        .color-grid {
            background: #111;
            padding: 20px;
            border-radius: 14px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
        }

        .color-option.disabled {
            opacity: 0;
            pointer-events: none;
        }

        /* Players */
        .players {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .player {
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            opacity: 1;
            transition: all 0.1s ease;
        }

        .player.active {
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 0 12px white;
        }

        /* Timer */
        .timerView {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 1rem;
        }

        .turn {
            text-align: center;
            flex: 1;
            font-size: 1.4rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }

        /* Circle */
        .timer-center {
            flex: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .timer-text {
            position: absolute;
            font-size: 2.5rem;
            font-weight: bold;
        }

        svg {
            width: 180px;
            height: 180px;
        }

        .circle-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 10;
        }

        .circle-progress {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: center;
        }

        .starter-wrapper {
            display: flex;
            flex-direction: row;
            gap: 0.8rem;
        }
    </style>
</head>

<body>

    <div class="app">

        <!-- CONFIG -->
        <div id="config" class="card">
            <h3>Rummy Timer</h3>

            <div class="player-row">
                <input id="p1" placeholder="Player 1">
                <div class="color-preview" id="c1"></div>
            </div>

            <div class="player-row">
                <input id="p2" placeholder="Player 2">
                <div class="color-preview" id="c2"></div>
            </div>

            <div class="player-row">
                <input id="p3" placeholder="Player 3">
                <div class="color-preview" id="c3"></div>
            </div>

            <div class="player-row">
                <input id="p4" placeholder="Player 4">
                <div class="color-preview" id="c4"></div>
            </div>



            <div class="starter-wrapper">
                <select id="starter">
                    <option value="0">Player 1 starts</option>
                    <option value="1">Player 2 starts</option>
                    <option value="2">Player 3 starts</option>
                    <option value="3">Player 4 starts</option>
                </select>
                <input id="timeInput" type="number" value="45" min="0" step="1" placeholder="Seconds">
            </div>
            <button onclick="startGame()">Start Game</button>

        </div>


        <!-- TIMER -->
        <div id="timerView" class="card timerView" style="display:none;">
            <div class="players" id="playersList"></div>
            <div class="turn" id="turnText"></div>

            <div class="timer-center">
                <svg>
                    <circle class="circle-bg" cx="90" cy="90" r="80" />
                    <circle id="progressCircle" class="circle-progress" cx="90" cy="90" r="80" stroke-dasharray="502"
                        stroke-dashoffset="0" />
                </svg>
                <div class="timer-text" id="timeDisplay">0</div>
            </div>
        </div>

    </div>

    <!-- COLOR MODAL -->
    <div class="color-modal" id="colorModal">
        <div class="color-grid" id="colorGrid"></div>
    </div>

    <script>
        const palette = [
            "#1f77b4", // blue
            "#2ca02c", // green
            "#ffbf00", // yellow (not pale)
            "#ff7f0e", // orange
            "#9467bd", // purple
            "#17becf", // cyan
            "#8c564b", // brown
            "#fcddf2"  // gray
        ];

        let playerColors = palette.slice(0, 4);
        let activePicker = null;

        /* Init previews */
        ["c1", "c2", "c3", "c4"].forEach((id, i) => {
            const el = document.getElementById(id);
            el.style.background = playerColors[i];

            el.onclick = () => {
                activePicker = i;
                openColorModal();
            };
        });

        /* Modal */
        function openColorModal() {
            colorModal.classList.add("active");
            colorGrid.innerHTML = "";

            palette.forEach(color => {
                const div = document.createElement("div");
                div.className = "color-option";
                div.style.background = color;

                if (playerColors.includes(color) && playerColors[activePicker] !== color) {
                    div.classList.add("disabled");
                }

                div.onclick = () => {
                    playerColors[activePicker] = color;
                    updatePreviews();
                    closeModal();
                };

                colorGrid.appendChild(div);
            });
        }

        function closeModal() {
            colorModal.classList.remove("active");
        }

        colorModal.onclick = (e) => {
            if (e.target === colorModal) closeModal();
        };

        function updatePreviews() {
            ["c1", "c2", "c3", "c4"].forEach((id, i) => {
                document.getElementById(id).style.background = playerColors[i];
            });
        }

        /* Focus preview */
        ["p1", "p2", "p3", "p4"].forEach((id, i) => {
            document.getElementById(id).addEventListener("focus", () => {
                document.body.style.background = playerColors[i] + "cc";
            });
        });

        /* Timer logic stays SAME (unchanged) */

        let players = [], currentPlayer = 0, duration = 0, remaining = 0, interval;
        const circumference = 502;

        function parseTime(v) {
            v = v.trim().toLowerCase();
            return parseFloat(v) * 1000;
        }

        function startGame() {
            players = [p1.value || "P1", p2.value || "P2", p3.value || "P3", p4.value || "P4"];
            currentPlayer = parseInt(starter.value) - 1;
            duration = parseTime(timeInput.value);

            config.style.display = "none";
            timerView.style.display = "flex";

            renderPlayers();
            startTimer();
        }

        function renderPlayers() {
            playersList.innerHTML = "";
            players.forEach((p, i) => {
                const d = document.createElement("div");
                d.className = "player";
                d.id = "pl" + i;
                d.innerText = p;
                d.style.background = playerColors[i];
                playersList.appendChild(d);
            });
        }

        function updateUI() {
            turnText.innerText = `It's ${players[currentPlayer]}'s turn`;
            document.querySelectorAll(".player").forEach(el => el.classList.remove("active"));
            document.getElementById("pl" + currentPlayer).classList.add("active");
        }

        function startTimer() {
            remaining = duration;
            updateUI();

            clearInterval(interval);

            interval = setInterval(() => {
                remaining -= 50;

                if (remaining <= 0) {
                    remaining = 0;
                    clearInterval(interval);
                    timeDisplay.innerText = "Discard!";
                    return;
                }

                updateDisplay();
            }, 50);
        }

        function hexToRgb(h) {
            const n = parseInt(h.slice(1), 16);
            return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
        }

        function interpolate(a, b, f) {
            return {
                r: Math.round(a.r + (b.r - a.r) * f),
                g: Math.round(a.g + (b.g - a.g) * f),
                b: Math.round(a.b + (b.b - a.b) * f)
            };
        }

        function updateDisplay() {
            timeDisplay.innerText = (remaining / 1000).toFixed(1);

            const progress = remaining / duration;
            progressCircle.style.strokeDashoffset = circumference * (1 - progress);

            const c1 = hexToRgb(playerColors[currentPlayer]);
            const c2 = { r: 255, g: 0, b: 0 };
            const c = interpolate(c1, c2, 1 - progress);

            document.body.style.background = `rgb(${c.r},${c.g},${c.b})`;
            progressCircle.style.stroke = playerColors[currentPlayer];
        }

        document.addEventListener("click", () => {
            if (timerView.style.display !== "flex") return;
            currentPlayer = (currentPlayer + 1) % players.length;
            startTimer();
        });

        let pressTimer = null;

        /* Start press */
        function startPress(e) {
            // only allow in timer screen
            if (timerView.style.display !== "flex") return;

            // ignore inputs/buttons
            if (e.target.tagName === "INPUT" || e.target.tagName === "BUTTON") return;

            pressTimer = setTimeout(() => {
                clearInterval(interval);

                timerView.style.display = "none";
                config.style.display = "block";

                document.body.style.background = "#0f172a";
            }, 700);
        }

        /* Cancel press */
        function cancelPress() {
            clearTimeout(pressTimer);
        }

        /* Mouse */
        document.addEventListener("mousedown", startPress);
        document.addEventListener("mouseup", cancelPress);
        document.addEventListener("mouseleave", cancelPress);

        /* Touch */
        document.addEventListener("touchstart", startPress);
        document.addEventListener("touchend", cancelPress);
    </script>

</body>

</html>
